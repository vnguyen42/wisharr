# Wisharr configuration.
# Copy to config/config.yml — ${VAR} references are replaced with environment variables.

plex:
  # Your admin account token — the ONLY secret Wisharr ever needs.
  # Managed-user tokens are minted on the fly from this one, every sync cycle.
  #
  # OPTIONAL if Wisharr runs on the same machine as Plex Media Server:
  # leave it empty and the token is auto-detected from the local install
  # (macOS preferences, Preferences.xml on Linux/Docker, Windows registry).
  # Otherwise, how to find it: https://support.plex.tv/articles/204059436
  token: ${PLEX_TOKEN}

  # PINs for protected Home profiles (profile title -> PIN). Omit if none.
  pins: {}
  #  Kids: "1234"

  # Home profiles to ignore.
  excludeUsers: []

sync:
  # How often watchlists are polled.
  intervalMinutes: 20
  # Also sync the admin account's own watchlist.
  includeOwner: true
  # When a sink or a user is synced for the very first time (fresh install,
  # a sink added later, a new friend or Home profile), absorb their existing
  # watchlist backlog silently instead of requesting everything at once.
  seedOnFirstRun: true
  # Also sync watchlists of friends outside the Plex Home (their watchlist
  # visibility must allow friends).
  friends: true
  # Near-real-time sync between polls via Plex Pass RSS feeds. Silently
  # skipped when the account has no Plex Pass.
  rss: true
  rssIntervalSeconds: 60
  # When an item leaves every watchlist: delete its Overseerr request and
  # unmonitor it in Radarr/Sonarr. Only touches items Wisharr itself added,
  # and never deletes files. Opt-in.
  removal: false

# Configure at least one sink. Overseerr/Jellyseerr is the recommended one:
# it handles quality profiles, approvals and both movies & shows by itself.
sinks:
  overseerr:
    url: http://localhost:5055
    apiKey: ${OVERSEERR_API_KEY}

  # radarr:
  #   url: http://localhost:7878
  #   apiKey: ${RADARR_API_KEY}
  #   qualityProfileId: 1
  #   rootFolderPath: /movies
  #   monitor: true
  #   searchOnAdd: true
  #   minimumAvailability: released

  # sonarr:
  #   url: http://localhost:8989
  #   apiKey: ${SONARR_API_KEY}
  #   qualityProfileId: 1
  #   rootFolderPath: /tv
  #   monitor: true
  #   searchOnAdd: true
  #   seasonFolder: true

database: data/wisharr.db

ui:
  enabled: true
  port: 9797
  # Uncomment to require a login on the web UI and API (recommended if the
  # port is reachable beyond your LAN):
  # auth:
  #   username: admin
  #   password: ${WISHARR_PASSWORD}
